server:
  port: 8086

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/rating_schema
    username: root
    password: *****
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    eureka-service-urls:
      defaultZone: http://localhost:8761/eureka/
